<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="MiniCAD logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="4" y="4" width="120" height="120" rx="24"/>
    </clipPath>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>

  <!-- blueprint grid -->
  <g clip-path="url(#rounded)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1">
    <path d="M28 4V124 M52 4V124 M76 4V124 M100 4V124"/>
    <path d="M4 28H124 M4 52H124 M4 76H124 M4 100H124"/>
  </g>

  <!-- technical sketch -->
  <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M36 88 L36 52 L64 34 L92 52 L92 88 Z"/>
    <path d="M36 52 L92 52"/>
  </g>

  <!-- vertex nodes -->
  <g fill="#93c5fd" stroke="#ffffff" stroke-width="2">
    <circle cx="36" cy="88" r="4"/>
    <circle cx="36" cy="52" r="4"/>
    <circle cx="64" cy="34" r="4"/>
    <circle cx="92" cy="52" r="4"/>
    <circle cx="92" cy="88" r="4"/>
  </g>
</svg>
